<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
    <title>Sebastian Gonzalez</title>
</head>
<body>

    <div class="language_control">
        <button class="language_button" type="button" aria-label="Cambiar idioma" aria-pressed="false">
            <span class="language_icon" aria-hidden="true"></span>
            <span class="language_text">ES</span>
        </button>
        <span class="language_hint" aria-live="polite"></span>
    </div>

    <div class="container">
      <button class="Button_1">button</button>  
        <div class="table_1" >
            <button class="table_expand" type="button" aria-label="Agrandar tablero">
                <span class="table_expand_icon" aria-hidden="true"></span>
            </button>
            <div class="expand_arrow" aria-hidden="true">
                <span class="expand_arrow_inner">
                    <span class="expand_arrow_line"></span>
                </span>
            </div>
            <div class="rope_left" >

            </div>
            <div class="rope_right"> 


            </div>
            
            <div class="table_content">
                <div class="intro_text" aria-live="polite">
                    <span class="intro_main"></span>
                    <span class="intro_note"></span>
                    <span class="intro_timer" aria-hidden="true">
                        <svg class="intro_timer_svg" viewBox="0 0 44 44">
                            <circle class="intro_timer_track" cx="22" cy="22" r="18"></circle>
                            <circle class="intro_timer_progress" cx="22" cy="22" r="18"></circle>
                        </svg>
                    </span>
                </div>
            </div> 
        </div>
     <button class="Button_2">button</button>    

   



    </div>

     










    <script src="script.js"></script>
</body>
</html>
